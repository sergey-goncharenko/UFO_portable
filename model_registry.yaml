# UFO2 Model Registry — Add models here to include them in pipeline evaluation
#
# To add a new model:
#   1. Add an entry under 'models'
#   2. Run: .\eval_pipeline.ps1 -RunModel "your_model_id"
#   Or run all: .\eval_pipeline.ps1 -RunAll
#
# Supported API types: openai, aoai, local (vLLM/Ollama compatible)

models:

  # ── OpenAI Models ──────────────────────────────────────────
  gpt-4o:
    provider: openai
    api_base: "https://api.openai.com/v1"
    model_id: "gpt-4o"
    visual_mode: true
    description: "GPT-4o — flagship, best accuracy, slow"
    cost_per_1k_input: 0.0025
    cost_per_1k_output: 0.01
    enabled: true

  gpt-4o-mini:
    provider: openai
    api_base: "https://api.openai.com/v1"
    model_id: "gpt-4o-mini"
    visual_mode: true
    description: "GPT-4o-mini — fast, cheap, good enough?"
    cost_per_1k_input: 0.00015
    cost_per_1k_output: 0.0006
    enabled: true

  gpt-4.1:
    provider: openai
    api_base: "https://api.openai.com/v1"
    model_id: "gpt-4.1"
    visual_mode: true
    description: "GPT-4.1 — newest flagship"
    cost_per_1k_input: 0.002
    cost_per_1k_output: 0.008
    enabled: false

  gpt-4.1-mini:
    provider: openai
    api_base: "https://api.openai.com/v1"
    model_id: "gpt-4.1-mini"
    visual_mode: true
    description: "GPT-4.1-mini — newest mini"
    cost_per_1k_input: 0.0004
    cost_per_1k_output: 0.0016
    enabled: false

  gpt-4.1-nano:
    provider: openai
    api_base: "https://api.openai.com/v1"
    model_id: "gpt-4.1-nano"
    visual_mode: true
    description: "GPT-4.1-nano — smallest, fastest"
    cost_per_1k_input: 0.0001
    cost_per_1k_output: 0.0004
    enabled: false

  o4-mini:
    provider: openai
    api_base: "https://api.openai.com/v1"
    model_id: "o4-mini"
    visual_mode: true
    reasoning_model: true
    description: "o4-mini — reasoning model with vision"
    cost_per_1k_input: 0.0011
    cost_per_1k_output: 0.0044
    enabled: false

  # ── Anthropic Models ───────────────────────────────────────
  claude-sonnet-4:
    provider: openai
    api_base: "https://api.anthropic.com/v1"
    model_id: "claude-sonnet-4-20250514"
    visual_mode: true
    description: "Claude Sonnet 4 via Anthropic API"
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    enabled: false
    note: "Requires ANTHROPIC_API_KEY. UFO uses openai-compatible endpoint."

  # ── Azure OpenAI ───────────────────────────────────────────
  # aoai-gpt4o:
  #   provider: aoai
  #   api_base: "https://YOUR_RESOURCE.openai.azure.com"
  #   model_id: "gpt-4o"
  #   deployment_id: "YOUR_DEPLOYMENT"
  #   visual_mode: true
  #   description: "Azure OpenAI GPT-4o"
  #   enabled: false

  # ── Local Models (vLLM / Ollama) ───────────────────────────
  # Uncomment and configure after setting up local inference
  
  # qwen2-vl-7b:
  #   provider: openai
  #   api_base: "http://localhost:8000/v1"
  #   model_id: "Qwen2-VL-7B-Instruct"
  #   visual_mode: true
  #   description: "Qwen2-VL 7B — local via vLLM"
  #   cost_per_1k_input: 0
  #   cost_per_1k_output: 0
  #   enabled: false

  # ui-tars-7b:
  #   provider: openai
  #   api_base: "http://localhost:8000/v1"
  #   model_id: "ByteDance-Seed/UI-TARS-1.5-7B"
  #   visual_mode: true
  #   description: "UI-TARS 7B — ByteDance, local via vLLM"
  #   cost_per_1k_input: 0
  #   cost_per_1k_output: 0
  #   enabled: false

# ── Task Suite ────────────────────────────────────────────────
# These are the tasks every model is tested against
tasks:
  - name: notepad_type
    request: "Open Notepad and type Hello World"
    optimal_steps: 3

  - name: calc_multiply
    request: "Open Calculator and compute 42 times 58"
    optimal_steps: 3

  - name: notepad_saveas
    request: "Open Notepad, type Benchmark Test, save as benchmark.txt on Desktop"
    optimal_steps: 6

  - name: explorer_folder
    request: "Open File Explorer and create a new folder on Desktop called EvalTest"
    optimal_steps: 5

  - name: notepad_selectall
    request: "Open Notepad, type Hello, select all text, copy it"
    optimal_steps: 5

# ── Pipeline Settings ─────────────────────────────────────────
settings:
  max_steps: 15
  results_dir: "eval_results"
  sleep_between_tasks: 5
  sleep_between_models: 10
